<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Magic Checklist</title>

    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
</head>

<body>

<div id="app">

    <!-- Главный экран -->
    <section id="home-screen" class="screen active">

        <button class="main-button performance-button" onclick="openMode('before')">
            <span>На выступление</span>
        </button>

        <button class="main-button after-button" onclick="openMode('after')">
            <span>После выступления</span>
        </button>

    </section>


    <!-- Выбор формата -->
    <section id="format-screen" class="screen">

        <button class="back-button" onclick="goHome()">
            ← Назад
        </button>

        <h1 id="mode-title"></h1>

        <div class="format-list">

            <button onclick="openChecklist('micro')">
                Микромагия
            </button>

            <button onclick="openChecklist('stage')">
                Сцена
            </button>

            <button onclick="openChecklist('stagePlus')">
                Сцена+
            </button>

            <button onclick="openChecklist('stageMicro')">
                Сцена+микро
            </button>

        </div>

    </section>


    <!-- Чеклист -->
    <section id="checklist-screen" class="screen">

        <button class="back-button" onclick="openMode(currentMode)">
            ← Назад
        </button>

        <h1 id="format-title">
            Микромагия
        </h1>

        <div id="progress">
            0 / 0
        </div>


        <div id="checklist-container">

        </div>


        <button id="finish-button">
            Готово
        </button>

    </section>


</div>


<script src="app.js"></script>

</body>
</html>
